app = "tutor-court"
primary_region = "ord"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/payload.db"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[mounts]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "5gb"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
